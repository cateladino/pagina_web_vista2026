name: Deploy to GoDaddy cPanel

# Disparador: se ejecuta en cada push a la rama main
on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy via FTP
    runs-on: ubuntu-latest

    steps:
      # 1. Descarga el código del repositorio
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Preflight: valida formato de secrets y conectividad DNS/FTP
      - name: Preflight FTP diagnostics
        shell: bash
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          set -euo pipefail
          echo "Starting FTP preflight checks..."
          echo "FTP_SERVER length: ${#FTP_SERVER}"
          echo "FTP_SERVER_DIR: ${FTP_SERVER_DIR}"

          if [ -z "${FTP_SERVER}" ]; then
            echo "::error::FTP_SERVER is empty."
            exit 1
          fi

          if [[ "${FTP_SERVER}" == *"://"* ]]; then
            echo "::error::FTP_SERVER must not include protocol (http://, https://, ftp://)."
            exit 1
          fi

          if [[ "${FTP_SERVER}" == */* ]]; then
            echo "::error::FTP_SERVER must be only hostname, without paths."
            exit 1
          fi

          if [[ "${FTP_SERVER}" == *":"* ]]; then
            echo "::error::FTP_SERVER must not include port. Use 'port: 21' in workflow."
            exit 1
          fi

          if [[ "${FTP_SERVER}" =~ [[:space:]] ]]; then
            echo "::error::FTP_SERVER contains spaces."
            exit 1
          fi

          echo "Resolving DNS..."
          if getent hosts "${FTP_SERVER}"; then
            echo "DNS resolution OK."
          else
            echo "::error::DNS resolution failed for FTP_SERVER."
            exit 1
          fi

          echo "Testing TCP connectivity to port 21..."
          if timeout 8 bash -c "cat < /dev/null > /dev/tcp/${FTP_SERVER}/21"; then
            echo "Port 21 reachable."
          else
            echo "::warning::Could not connect to port 21. DNS works, but FTP service may be blocked or disabled."
          fi

      # 3. Despliega via FTP a GoDaddy cPanel
      # Sube solo los archivos que cambiaron (estado en .ftp-deploy-sync-state.json)
      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          # Debe ser solo hostname, sin http/https, sin puerto y sin rutas
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          # Deja el destino como espejo del repositorio
          dangerous-clean-slate: true
          # Excluir archivos que no deben subirse al servidor
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.DS_Store
            **/package-lock.json
            **/.github/**
            **/.well-known/**
